<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - JuriSight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #3b82f6;
            --secondary: #64748b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #0f172a; --dark-light: #1e293b;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b;
            --gray-600: #475569; --gray-700: #334155; --gray-800: #1e293b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: var(--gray-800); line-height: 1.6; min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            box-shadow: var(--shadow); padding: 0; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand {
            font-size: 24px; font-weight: 700; background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .nav-brand i { font-size: 28px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 32px; align-items: center; list-style: none; }
        .nav-link {
            text-decoration: none; color: var(--gray-600); font-weight: 500; font-size: 14px;
            transition: all 0.3s ease; padding: 8px 16px; border-radius: 8px;
        }
        .nav-link:hover { color: var(--primary); background: rgba(37, 99, 235, 0.05); }
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 32px 60px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--primary);
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--gray-500);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .form-input::placeholder {
            color: var(--gray-400);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
            font-size: 14px;
        }
        .message.show { display: flex; }
        .message.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.1) 100%);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .message.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            margin-top: 24px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: var(--primary-dark);
            transform: translateX(-4px);
        }
        .footer {
            background: white;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-top: auto;
        }
        .footer-text {
            color: var(--gray-500);
            font-size: 13px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .login-card { padding: 32px 24px; }
            .nav-container { padding: 16px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <i class="fas fa-scale-balanced"></i>
                JuriSight
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="login-title">Admin Login</h1>
                <p class="login-subtitle">Access your dashboard and search history</p>
            </div>

            <div id="messageContainer" class="message"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user" style="margin-right: 6px;"></i>
                        Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock" style="margin-right: 6px;"></i>
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>
            </form>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-text">
            © 2024 JuriSight - Admin Portal | 
            <a href="#" style="color: var(--primary); text-decoration: none;">Help</a> | 
            <a href="#" style="color: var(--primary); text-decoration: none;">Contact Support</a>
        </p>
    </footer>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                showMessage('error', 'Please enter both username and password');
                return;
            }

            const originalBtnContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="loading"></span><span>Logging in...</span>';
            loginBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Login failed');
                }

                // Save session
                localStorage.setItem('adminSessionToken', result.session_token);
                localStorage.setItem('adminUsername', result.username);

                showMessage('success', 'Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showMessage('error', error.message || 'Invalid credentials. Please try again.');
                loginBtn.innerHTML = originalBtnContent;
                loginBtn.disabled = false;
            }
        }

        function showMessage(type, text) {
            const messageContainer = document.getElementById('messageContainer');
            messageContainer.className = `message ${type} show`;
            messageContainer.innerHTML = `
                <i class="fas ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i>
                <span>${text}</span>
            `;
            setTimeout(() => messageContainer.classList.remove('show'), 5000);
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const sessionToken = localStorage.getItem('adminSessionToken');
            if (sessionToken) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
